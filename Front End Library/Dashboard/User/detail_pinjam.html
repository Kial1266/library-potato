<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Peminjaman Buku - Perpustakaan</title>

    <link rel="icon" href="../../images/s.png" type="image/png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* RESET & DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4fcf7;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TOPBAR / NAVBAR */
        .header_section {
            background-color: #16a34a;
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .navbar { padding: 0; }
        .navbar-brand img { width: 50px; height: auto; }
        .navbar-nav .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-size: 16px;
            font-weight: 500;
            margin-left: 20px;
            transition: 0.3s;
        }
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active {
            color: #ffffff !important;
            border-bottom: 2px solid #ffffff;
        }

        /* KARTU FORM */
        .card-custom {
            background-color: #ffffff;
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .card-header-custom {
            background-color: #16a34a;
            color: white;
            padding: 15px 25px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: none;
        }

        .book-cover-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .book-cover-wrapper img {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 8/12;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        /* FORM STYLING */
        .input-group-text {
            background-color: #f9fafb;
            color: #4b5563;
            font-weight: 500;
            border-color: #d1d5db;
        }
        .form-control, .form-select {
            border-color: #d1d5db;
        }
        .form-control:focus, .form-select:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 0.25rem rgba(22, 163, 74, 0.25);
        }
        .form-control[readonly] {
            background-color: #f3f4f6;
            color: #6b7280;
        }

        /* TOMBOL */
        .btn-success-custom {
            background-color: #16a34a;
            color: white;
            font-weight: 500;
            border: none;
            transition: 0.3s;
        }
        .btn-success-custom:hover {
            background-color: #15803d;
            color: white;
        }
        .btn-danger-custom {
            background-color: #ef4444;
            color: white;
            font-weight: 500;
            border: none;
            transition: 0.3s;
        }
        .btn-danger-custom:hover {
            background-color: #dc2626;
            color: white;
        }
    </style>
</head>

<body>

    <div class="header_section">
        <div class="container-fluid px-4">
            <nav class="navbar navbar-expand-lg">
                <a class="navbar-brand" href="dashboard.html">
                    <img src="../../images/s.png" alt="Logo Fapus">
                </a>
                <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <i class="fas fa-bars fs-3"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="#">Pinjam Buku</a></li>
                        <li class="nav-item"><a class="nav-link" href="dashboard.html">Kembali</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>

    <div class="container-xxl p-4">
        
        <div class="alert alert-dark border-0 shadow-sm" style="background-color: #e5e7eb; color: #374151; font-weight: 500;">
            <i class="fas fa-info-circle me-2 text-primary"></i> Form Peminjaman Buku
        </div>

        <div class="card card-custom">
            <div class="card-header-custom">
                <i class="fas fa-book me-2"></i> Data Lengkap Buku & Form Pinjam
            </div>
            
            <div class="card-body p-4">
                <div class="row">
                    
                    <div class="col-lg-3 book-cover-wrapper">
                        <img id="detailCover" src="../../images/a.png" alt="Cover Buku" onerror="this.src='../../images/a.png'">
                    </div>

                    <div class="col-lg-9">
                        <form id="formPeminjaman">
                            
                            <h5 class="mb-3 text-success fw-bold border-bottom pb-2">Informasi Buku</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <div class="input-group">
                                        <span class="input-group-text">ID Buku</span>
                                        <input type="text" id="id_buku" name="id_buku" class="form-control" readonly>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="input-group">
                                        <span class="input-group-text">Kategori</span>
                                        <input type="text" id="kategori" class="form-control" readonly>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="input-group mb-3">
                                <span class="input-group-text">Judul Buku</span>
                                <input type="text" id="judul" class="form-control" readonly>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <div class="input-group">
                                        <span class="input-group-text">Pengarang</span>
                                        <input type="text" id="pengarang" class="form-control" readonly>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text">Penerbit</span>
                                        <input type="text" id="penerbit" class="form-control" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text">Tahun Terbit</span>
                                        <input type="text" id="thn_terbit" class="form-control" readonly>
                                    </div>
                                </div>
                            </div>

                            <h5 class="mb-3 text-success fw-bold border-bottom pb-2 mt-4">Form Pengajuan Pinjam</h5>
                            
                            <div class="input-group mb-4">
                                <span class="input-group-text">ID Pengguna (User ID)</span>
                                <input type="text" id="userID" name="userID" class="form-control" readonly>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="dashboard.html" class="btn btn-danger-custom px-4 py-2">Batal</a>
                                <button type="submit" class="btn btn-success-custom px-4 py-2"><i class="fas fa-paper-plane me-2"></i> Ajukan Pinjaman</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="detail_pinjam.js"></script>
</body>

</html>
